name: Release

on:
  push:
    branches: [master, beta]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Pick config
        id: cfg
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ "$BRANCH" = "beta" ]; then
            echo "config=release-please-config-beta.json" >> $GITHUB_OUTPUT
            echo "manifest=.release-please-manifest-beta.json" >> $GITHUB_OUTPUT
          else
            echo "config=release-please-config.json" >> $GITHUB_OUTPUT
            echo "manifest=.release-please-manifest.json" >> $GITHUB_OUTPUT
          fi

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: ${{ github.ref_name }}
          config-file: ${{ steps.cfg.outputs.config }}
          manifest-file: ${{ steps.cfg.outputs.manifest }}

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/_build.yml

  publish:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: dist/cli

      - uses: actions/download-artifact@v4
        with:
          name: android-aar
          path: dist/android

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: gh release upload "$TAG" dist/cli/* dist/android/olcrtc.aar --clobber --repo "$REPO"
