name: Build (reusable)

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Build cross
        run: mage cross

      - uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: build/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Build mobile
        run: mage mobile

      - uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: build/olcrtc*
